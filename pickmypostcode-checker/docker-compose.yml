services:
  pickmypostcode-checker:
    build:
      context: .
    container_name: pickmypostcode-checker
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8099}:8080"
    environment:
      POSTCODE: "${POSTCODE}"
      HOST_PORT: "${HOST_PORT:-8099}"
      CHECK_TIME: "${CHECK_TIME:-15:30}"
      TZ: "${TZ:-Europe/London}"
      ENTRY_ID: "${ENTRY_ID:-27079}"
      CHECK_URL_TEMPLATE: "${CHECK_URL_TEMPLATE:-https://pickmypostcode.com/api/index.php/entry/current/{entry_id}}"
      PUSHOVER_APP_TOKEN: "${PUSHOVER_APP_TOKEN:-}"
      PUSHOVER_USER_KEY: "${PUSHOVER_USER_KEY:-}"
      PUSHOVER_DEVICE: "${PUSHOVER_DEVICE:-}"
      PUSHOVER_SOUND: "${PUSHOVER_SOUND:-}"
      PUSHOVER_TITLE: "${PUSHOVER_TITLE:-Pick My Postcode}"
      PUSHOVER_URL: "${PUSHOVER_URL:-}"
      PUSHOVER_URL_TITLE: "${PUSHOVER_URL_TITLE:-}"
      SURVEY_URL: "${SURVEY_URL:-https://pickmypostcode.com/survey-draw/}"
      SURVEY_ANSWERS_JSON: "${SURVEY_ANSWERS_JSON:-{\"radio-1\":\"neither\"}}"
      REQUEST_TIMEOUT: "${REQUEST_TIMEOUT:-20}"
      HTTP_PORT: "8080"
      STATE_PATH: "/data/state.json"
    volumes:
      - checker-data:/data

volumes:
  checker-data:
